name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Valores mínimos para o build não falhar por variável ausente
          DATABASE_URL: "postgresql://postgres:dev@localhost:5432/nexora_dev"
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_BRAND_NAME: "Nexora EDU"
          NEXT_PUBLIC_BRAND_TAGLINE: "Educação sem fronteiras"
